<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WebStudio Builder - محرر المواقع المرئي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ============================================================
           CSS VARIABLES – نظام الألوان المركزي (الثيم)
           ============================================================ */
        :root {
            /* الألوان الأساسية */
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --primary-bg: #eff6ff;
            --primary-glow: rgba(37, 99, 235, 0.3);
            
            --secondary: #8b5cf6;
            --secondary-light: #a78bfa;
            --secondary-dark: #7c3aed;
            
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #06b6d4;
            
            /* الخلفيات والسطح */
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            
            /* النصوص */
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            
            /* الظلال */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            
            /* الزوايا */
            --radius-sm: 8px;
            --radius: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --radius-full: 9999px;
            
            /* الخطوط */
            --font-family: 'Cairo', sans-serif;
            --font-size-base: 1rem;
            
            /* الانتقالات */
            --transition: 0.2s ease;
        }

        /* ============================================================
           الثيم المظلم (Dark Mode) – يتم تفعيله عبر JS بإضافة class
           ============================================================ */
        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --surface-alt: #334155;
            --border: #334155;
            --border-hover: #475569;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --primary-bg: #1e293b;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        /* ============================================================
           الأنماط الأساسية
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }
        body {
            background: var(--bg);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            overflow: hidden;
            height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }
        input, select, textarea { font-family: inherit; }

        /* ============================================================
           شاشة المصادقة (محاكاة)
           ============================================================ */
        #authScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(145deg, #0b2b26, #1a4a3a);
        }
        .auth-card {
            background: var(--surface);
            padding: 2.5rem 2rem;
            border-radius: var(--radius-xl);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: var(--shadow-xl);
            border: 1px solid var(--border);
        }
        .auth-card h2 {
            font-size: 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .auth-card p { color: var(--text-muted); margin-bottom: 1.5rem; }
        .auth-card input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border-radius: var(--radius-full);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            transition: var(--transition);
        }
        .auth-card input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .auth-card button {
            width: 100%;
            padding: 12px;
            border-radius: var(--radius-full);
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            transition: var(--transition);
            margin-top: 12px;
        }
        .auth-card button:hover { background: var(--primary-dark); transform: scale(0.97); }
        .auth-card .toggle-auth {
            color: var(--primary);
            margin-top: 16px;
            font-weight: 600;
            cursor: pointer;
            display: inline-block;
        }
        .auth-card .demo-btn {
            background: var(--text-secondary);
            margin-top: 12px;
        }
        .auth-card .demo-btn:hover { background: var(--text-primary); }

        /* ============================================================
           لوحة التحكم الرئيسية
           ============================================================ */
        #dashboard {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: var(--bg);
        }

        /* الشريط العلوي */
        .toolbar {
            background: var(--surface);
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .toolbar .logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .toolbar-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .toolbar-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition);
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .toolbar-btn:hover {
            background: var(--primary-bg);
            border-color: var(--primary);
            color: var(--primary);
        }
        .toolbar-btn-primary {
            background: var(--primary);
            color: #fff;
            border: none;
        }
        .toolbar-btn-primary:hover {
            background: var(--primary-dark);
            color: #fff;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-secondary);
        }

        /* أزرار التنقل بين الصفحات */
        .pages-tabs {
            background: var(--surface);
            padding: 8px 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .page-tab {
            background: var(--bg);
            padding: 6px 16px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            color: var(--text-secondary);
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .page-tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }
        .page-tab:hover:not(.active) {
            background: var(--surface-alt);
            border-color: var(--border-hover);
        }
        .page-tab i { font-size: 0.8rem; cursor: pointer; }
        .add-page-btn {
            background: var(--primary-bg);
            border: 1px dashed var(--primary);
            padding: 6px 16px;
            border-radius: var(--radius-full);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .add-page-btn:hover {
            background: var(--primary);
            color: #fff;
        }

        /* التخطيط الرئيسي */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* اللوحة الجانبية للمكونات */
        .components-panel {
            width: 280px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .components-panel-header {
            padding: 16px 20px;
            font-weight: 800;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .components-panel-header input {
            width: 70%;
            padding: 6px 12px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border);
            background: var(--bg);
            font-size: 0.85rem;
        }
        .components-category {
            margin: 8px 0;
        }
        .category-title {
            padding: 8px 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            color: var(--text-secondary);
            border-radius: var(--radius);
            transition: var(--transition);
        }
        .category-title:hover {
            background: var(--surface-alt);
        }
        .components-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 0 12px 12px 12px;
        }
        .comp-chip {
            background: var(--bg);
            padding: 6px 12px;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid transparent;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
        }
        .comp-chip:hover {
            border-color: var(--primary);
            background: var(--primary-bg);
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* منطقة المعاينة (الكانفاس) */
        .canvas-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg);
        }
        .site-preview {
            max-width: 1200px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: 500px;
            padding: 20px;
            transition: background 0.3s;
        }
        .component-block {
            position: relative;
            margin: 16px 0;
            padding: 12px;
            border: 2px solid transparent;
            border-radius: var(--radius);
            transition: var(--transition);
            cursor: pointer;
        }
        .component-block:hover {
            border-color: var(--border-hover);
        }
        .component-block.selected {
            border-color: var(--primary);
            background: var(--primary-bg);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }
        .component-block .delete-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--danger);
            color: #fff;
            border-radius: var(--radius-full);
            padding: 2px 12px;
            font-size: 0.75rem;
            display: none;
            z-index: 10;
        }
        .component-block:hover .delete-btn {
            display: block;
        }

        /* لوحة الخصائص */
        .inspector {
            width: 320px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 20px;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }
        .inspector h4 {
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .inspector-field {
            margin-bottom: 16px;
        }
        .inspector-field label {
            display: block;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .inspector-field input,
        .inspector-field select,
        .inspector-field textarea {
            width: 100%;
            padding: 8px 12px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .inspector-field input[type="color"] {
            height: 40px;
            padding: 2px;
        }
        .inspector-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .inspector-actions button {
            padding: 6px 14px;
            border-radius: var(--radius-full);
            background: var(--surface-alt);
            border: 1px solid var(--border);
            font-weight: 600;
            font-size: 0.8rem;
            transition: var(--transition);
        }
        .inspector-actions button:hover {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        /* الرسائل المنبثقة */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-primary);
            color: #fff;
            padding: 10px 24px;
            border-radius: var(--radius-full);
            z-index: 9999;
            font-weight: 500;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px) translateX(-50%); }
            to { opacity: 1; transform: translateY(0) translateX(-50%); }
        }

        /* استجابة للجوال */
        @media (max-width: 900px) {
            .components-panel {
                position: fixed;
                right: -100%;
                top: 64px;
                bottom: 0;
                width: 280px;
                z-index: 100;
                border-left: none;
                box-shadow: var(--shadow-xl);
            }
            .components-panel.open {
                right: 0;
            }
            .inspector {
                position: fixed;
                left: -100%;
                top: 64px;
                bottom: 0;
                width: 300px;
                z-index: 100;
                border-right: none;
                box-shadow: var(--shadow-xl);
            }
            .inspector.open {
                left: 0;
            }
            .mobile-menu-btn {
                display: inline-block !important;
            }
            .toolbar-actions .hide-mobile {
                display: none;
            }
        }
        .mobile-menu-btn {
            display: none;
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: var(--radius);
            font-size: 1.2rem;
        }
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 50;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>

<!-- ============================================================
     شاشة المصادقة
     ============================================================ -->
<div id="authScreen">
    <div class="auth-card">
        <i class="fas fa-cube" style="font-size: 48px; color: var(--primary);"></i>
        <h2>WebStudio Builder</h2>
        <p>أنشئ موقعاً احترافياً ببضع نقرات</p>
        <input type="text" id="regName" placeholder="الاسم (للتسجيل)" style="display:none;">
        <input type="email" id="authEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="authPassword" placeholder="كلمة المرور">
        <button id="authActionBtn">دخول</button>
        <div class="toggle-auth" id="toggleAuthMode">🆕 إنشاء حساب جديد</div>
        <button class="demo-btn" id="demoBtn">🚀 دخول تجريبي فوري</button>
    </div>
</div>

<!-- ============================================================
     لوحة التحكم
     ============================================================ -->
<div id="dashboard">
    <!-- الشريط العلوي -->
    <div class="toolbar">
        <div style="display:flex; align-items:center; gap:12px;">
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
            <span class="logo">⚡ WebStudio</span>
        </div>
        <div class="toolbar-actions">
            <button class="toolbar-btn" id="undoBtn"><i class="fas fa-undo"></i> تراجع</button>
            <button class="toolbar-btn" id="redoBtn"><i class="fas fa-redo"></i> إعادة</button>
            <button class="toolbar-btn toolbar-btn-primary" id="exportBtn"><i class="fas fa-download"></i> تصدير HTML</button>
            <button class="toolbar-btn" id="themeToggle"><i class="fas fa-moon"></i> المظهر</button>
            <button class="toolbar-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="user-info" id="userNameHeader"></div>
    </div>

    <!-- تبويبات الصفحات -->
    <div class="pages-tabs" id="pagesTabs"></div>

    <!-- التخطيط الرئيسي -->
    <div class="main-layout">
        <!-- لوحة المكونات -->
        <div class="components-panel" id="componentsPanel">
            <div class="components-panel-header">
                <span><i class="fas fa-cubes"></i> المكونات</span>
                <input type="text" id="searchComponents" placeholder="بحث...">
            </div>
            <div id="componentsList" style="padding: 8px 0;"></div>
        </div>

        <!-- منطقة المعاينة -->
        <div class="canvas-area" id="canvasArea">
            <div class="site-preview" id="previewContainer"></div>
        </div>

        <!-- لوحة الخصائص -->
        <div class="inspector" id="inspectorPanel">
            <h4><i class="fas fa-sliders-h"></i> الخصائص</h4>
            <div id="inspectorContent">اختر عنصراً لتعديله</div>
        </div>
    </div>
</div>

<!-- طبقة التغطية للجوال -->
<div class="overlay" id="overlay"></div>

<!-- ============================================================
     جافا سكريبت – المحرر والنظام
     ============================================================ -->
<script>
    (function() {
        'use strict';

        // ============================================================
        // 1. نظام الثيم (الألوان المركزية)
        // ============================================================
        const themeManager = {
            currentTheme: 'light', // light | dark
            init() {
                // استرجاع التفضيل المخزن
                const saved = localStorage.getItem('webstudio_theme');
                if (saved === 'dark') {
                    document.body.classList.add('dark-mode');
                    this.currentTheme = 'dark';
                }
                // زر تبديل الثيم
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggle();
                });
            },
            toggle() {
                document.body.classList.toggle('dark-mode');
                this.currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
                localStorage.setItem('webstudio_theme', this.currentTheme);
                // تحديث واجهة الزر
                const btn = document.getElementById('themeToggle');
                btn.innerHTML = this.currentTheme === 'dark' ? '<i class="fas fa-sun"></i> فاتح' : '<i class="fas fa-moon"></i> مظلم';
            }
        };

        // ============================================================
        // 2. نموذج البيانات
        // ============================================================
        let pages = [
            { id: 'home', name: '🏠 الرئيسية', components: [] }
        ];
        let currentPageId = 'home';
        let selectedComponentId = null;
        let historyStack = [];
        let historyPos = -1;

        // ============================================================
        // 3. تعريف مكونات المكتبة (أكثر من 15 نوعاً)
        // ============================================================
        const componentLibrary = {
            'أساسيات': [
                { type: 'heading', name: 'عنوان (h1)', defaultProps: { text: 'عنوان رئيسي', level: 'h1', style: { fontSize: '2.5rem', fontWeight: 800 } } },
                { type: 'paragraph', name: 'فقرة نصية', defaultProps: { text: 'هذه فقرة نصية يمكنك تعديلها.', style: { fontSize: '1rem' } } },
                { type: 'button', name: 'زر', defaultProps: { text: 'زر جديد', link: '#', style: { backgroundColor: 'var(--primary)', color: '#fff', borderRadius: 'var(--radius-full)', padding: '10px 24px' } } },
                { type: 'image', name: 'صورة', defaultProps: { src: 'https://picsum.photos/400/250', alt: 'صورة', style: { borderRadius: 'var(--radius)', width: '100%', maxWidth: '400px' } } },
                { type: 'video', name: 'فيديو', defaultProps: { src: 'https://www.w3schools.com/html/mov_bbb.mp4', style: { width: '100%', maxWidth: '600px', borderRadius: 'var(--radius)' } } },
            ],
            'الهيكل': [
                { type: 'navbar', name: 'شريط تنقل', defaultProps: { logo: 'شعارك', items: 'الرئيسية,خدمات,اتصل بنا', style: { backgroundColor: 'var(--surface)', padding: '12px 24px', borderRadius: 'var(--radius-full)', boxShadow: 'var(--shadow)' } } },
                { type: 'footer', name: 'تذييل', defaultProps: { text: '© 2026 جميع الحقوق محفوظة', style: { backgroundColor: 'var(--surface)', padding: '24px', textAlign: 'center', borderTop: '1px solid var(--border)' } } },
                { type: 'hero', name: 'قسم هيرو', defaultProps: { title: 'مرحباً بك في WebStudio', subtitle: 'ابني موقع أحلامك بسهولة', btnText: 'ابدأ الآن', btnLink: '#', style: { padding: '60px 20px', textAlign: 'center', backgroundColor: 'var(--primary-bg)', borderRadius: 'var(--radius-lg)' } } },
            ],
            'المحتوى': [
                { type: 'card', name: 'بطاقة', defaultProps: { title: 'بطاقة مميزة', description: 'وصف مختصر', image: 'https://picsum.photos/300/200', style: { padding: '20px', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', backgroundColor: 'var(--surface)' } } },
                { type: 'gallery', name: 'معرض صور', defaultProps: { images: 'https://picsum.photos/200/150,https://picsum.photos/201/150,https://picsum.photos/202/150', style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px,1fr))', gap: '12px' } } },
                { type: 'testimonial', name: 'شهادة عميل', defaultProps: { quote: 'خدمة رائعة أنصح بها الجميع.', author: 'أحمد محمد', style: { padding: '20px', backgroundColor: 'var(--primary-bg)', borderRadius: 'var(--radius)', fontStyle: 'italic' } } },
                { type: 'pricing', name: 'بطاقة سعر', defaultProps: { title: 'باقة أساسية', price: '99', features: 'ميزة 1,ميزة 2,ميزة 3', style: { padding: '24px', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', backgroundColor: 'var(--surface)', textAlign: 'center' } } },
            ],
            'التفاعل': [
                { type: 'contact-form', name: 'نموذج اتصال', defaultProps: { fields: 'الاسم,البريد الإلكتروني,الرسالة', style: { padding: '20px', backgroundColor: 'var(--surface)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)' } } },
                { type: 'map', name: 'خريطة', defaultProps: { embed: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509723!2d144.9537353153164!3d-37.81627997975158!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d5df1f1f1f1%3A0x5045675218ce6e0!2sMelbourne%20VIC%2C%20Australia!5e0!3m2!1sen!2sus!4v1611111111111!5m2!1sen!2sus', style: { width: '100%', height: '300px', borderRadius: 'var(--radius)' } } },
                { type: 'social-links', name: 'روابط التواصل', defaultProps: { links: 'https://facebook.com,https://twitter.com,https://instagram.com', style: { display: 'flex', gap: '12px', justifyContent: 'center' } } },
            ]
        };

        // ============================================================
        // 4. دوال مساعدة
        // ============================================================
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        }

        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = msg;
            if (isError) t.style.background = 'var(--danger)';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function saveToLocal() {
            const data = {
                pages: pages,
                currentPageId: currentPageId
            };
            localStorage.setItem('webstudio_pages', JSON.stringify(data));
            pushHistory();
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('webstudio_pages');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    pages = data.pages;
                    currentPageId = data.currentPageId || pages[0]?.id || 'home';
                    // التأكد من وجود الصفحة الحالية
                    if (!pages.find(p => p.id === currentPageId)) {
                        currentPageId = pages[0]?.id || 'home';
                    }
                    renderAll();
                    pushHistory();
                    return true;
                } catch (e) { /* ignore */ }
            }
            // إذا لم يكن هناك حفظ، نضيف مكونات تجريبية
            const homePage = pages.find(p => p.id === 'home');
            if (homePage && homePage.components.length === 0) {
                homePage.components.push({
                    id: generateId(),
                    type: 'hero',
                    props: {
                        title: 'ابدأ الآن مجاناً',
                        subtitle: 'جميع الأدوات التي تحتاجها لبناء موقعك',
                        btnText: 'استكشف',
                        btnLink: '#',
                        style: { padding: '60px 20px', textAlign: 'center', backgroundColor: 'var(--primary-bg)', borderRadius: 'var(--radius-lg)' }
                    }
                });
                homePage.components.push({
                    id: generateId(),
                    type: 'card',
                    props: {
                        title: 'تصميم حديث',
                        description: 'واجهات جذابة وسهلة الاستخدام',
                        image: 'https://picsum.photos/300/200',
                        style: { padding: '20px', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', backgroundColor: 'var(--surface)' }
                    }
                });
            }
            renderAll();
            pushHistory();
            return true;
        }

        // ============================================================
        // 5. التراجع والإعادة
        // ============================================================
        function pushHistory() {
            const state = JSON.parse(JSON.stringify({ pages, currentPageId }));
            historyStack = historyStack.slice(0, historyPos + 1);
            historyStack.push(state);
            historyPos++;
            if (historyStack.length > 50) historyStack.shift();
        }

        function undo() {
            if (historyPos > 0) {
                historyPos--;
                const state = historyStack[historyPos];
                pages = state.pages;
                currentPageId = state.currentPageId;
                renderAll();
                showToast('↩️ تراجع');
            }
        }

        function redo() {
            if (historyPos < historyStack.length - 1) {
                historyPos++;
                const state = historyStack[historyPos];
                pages = state.pages;
                currentPageId = state.currentPageId;
                renderAll();
                showToast('↪️ إعادة');
            }
        }

        // ============================================================
        // 6. إدارة المكونات (إضافة، حذف، تحديث)
        // ============================================================
        function addComponent(compDef) {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            const newComp = {
                id: generateId(),
                type: compDef.type,
                props: JSON.parse(JSON.stringify(compDef.defaultProps))
            };
            page.components.push(newComp);
            renderAll();
            saveToLocal();
            showToast(`➕ تم إضافة ${compDef.name}`);
        }

        function deleteComponent(compId) {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            page.components = page.components.filter(c => c.id !== compId);
            if (selectedComponentId === compId) selectedComponentId = null;
            renderAll();
            saveToLocal();
            showToast('🗑️ حذف العنصر');
        }

        function updateComponent(compId, newProps) {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            const comp = page.components.find(c => c.id === compId);
            if (!comp) return;
            // دمج الخصائص الجديدة مع القديمة
            for (const [key, value] of Object.entries(newProps)) {
                if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                    // دمج الكائنات (مثل style)
                    comp.props[key] = { ...comp.props[key], ...value };
                } else {
                    comp.props[key] = value;
                }
            }
            renderAll();
            saveToLocal();
        }

        // ============================================================
        // 7. عرض المكونات (إنتاج HTML)
        // ============================================================
        function renderComponent(comp) {
            const p = comp.props;
            const style = p.style || {};
            const inlineStyle = Object.entries(style)
                .map(([k, v]) => `${k.replace(/([A-Z])/g, '-$1').toLowerCase()}:${v}`)
                .join(';');

            // دالة مساعدة لتوليد عناصر التحرير
            const wrap = (html) => `<div class="component-block" data-id="${comp.id}">
                <div class="delete-btn" data-id="${comp.id}"><i class="fas fa-trash"></i> حذف</div>
                ${html}
            </div>`;

            switch (comp.type) {
                case 'heading':
                    const H = p.level || 'h1';
                    return wrap(`<${H} style="${inlineStyle}">${p.text}</${H}>`);
                case 'paragraph':
                    return wrap(`<p style="${inlineStyle}">${p.text}</p>`);
                case 'button':
                    return wrap(`<a href="${p.link || '#'}" style="${inlineStyle}">${p.text}</a>`);
                case 'image':
                    return wrap(`<img src="${p.src}" alt="${p.alt || ''}" style="${inlineStyle}">`);
                case 'video':
                    return wrap(`<video controls style="${inlineStyle}"><source src="${p.src}"></video>`);
                case 'navbar':
                    const items = (p.items || '').split(',').map(i => i.trim()).filter(i => i);
                    return wrap(`
                        <nav style="${inlineStyle};display:flex;justify-content:space-between;align-items:center;">
                            <strong>${p.logo}</strong>
                            <div style="display:flex;gap:16px;">${items.map(i => `<span>${i}</span>`).join('')}</div>
                        </nav>
                    `);
                case 'footer':
                    return wrap(`<footer style="${inlineStyle}">${p.text}</footer>`);
                case 'hero':
                    return wrap(`
                        <div style="${inlineStyle}">
                            <h1>${p.title}</h1>
                            <p style="font-size:1.2rem;margin:12px 0;">${p.subtitle}</p>
                            <a href="${p.btnLink || '#'}" style="display:inline-block;background:var(--primary);color:#fff;padding:10px 28px;border-radius:var(--radius-full);">${p.btnText}</a>
                        </div>
                    `);
                case 'card':
                    return wrap(`
                        <div style="${inlineStyle}">
                            <img src="${p.image}" style="width:100%;border-radius:var(--radius);height:180px;object-fit:cover;">
                            <h3 style="margin:12px 0 4px;">${p.title}</h3>
                            <p>${p.description}</p>
                        </div>
                    `);
                case 'gallery':
                    const imgs = (p.images || '').split(',').map(s => s.trim()).filter(s => s);
                    const gridStyle = p.style || {};
                    const gridInline = Object.entries(gridStyle).map(([k, v]) => `${k.replace(/([A-Z])/g, '-$1').toLowerCase()}:${v}`).join(';');
                    return wrap(`
                        <div style="${gridInline}">
                            ${imgs.map(src => `<img src="${src}" style="width:100%;border-radius:var(--radius);height:150px;object-fit:cover;">`).join('')}
                        </div>
                    `);
                case 'testimonial':
                    return wrap(`
                        <div style="${inlineStyle}">
                            <p>"${p.quote}"</p>
                            <strong>— ${p.author}</strong>
                        </div>
                    `);
                case 'pricing':
                    const features = (p.features || '').split(',').map(f => f.trim()).filter(f => f);
                    return wrap(`
                        <div style="${inlineStyle}">
                            <h3>${p.title}</h3>
                            <div style="font-size:2rem;font-weight:700;">${p.price} ₪</div>
                            <ul style="list-style:none;padding:0;margin:12px 0;">${features.map(f => `<li>✔ ${f}</li>`).join('')}</ul>
                            <button style="background:var(--primary);color:#fff;border:none;padding:8px 24px;border-radius:var(--radius-full);">اختر</button>
                        </div>
                    `);
                case 'contact-form':
                    const fields = (p.fields || '').split(',').map(f => f.trim()).filter(f => f);
                    return wrap(`
                        <div style="${inlineStyle}">
                            <h4>تواصل معنا</h4>
                            ${fields.map(f => `<input type="text" placeholder="${f}" style="width:100%;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);">`).join('')}
                            <button style="background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-full);margin-top:8px;">إرسال</button>
                        </div>
                    `);
                case 'map':
                    return wrap(`<iframe src="${p.embed}" style="${inlineStyle}" allowfullscreen loading="lazy"></iframe>`);
                case 'social-links':
                    const links = (p.links || '').split(',').map(l => l.trim()).filter(l => l);
                    const icons = ['fab fa-facebook', 'fab fa-twitter', 'fab fa-instagram', 'fab fa-youtube'];
                    return wrap(`
                        <div style="${inlineStyle}">
                            ${links.map((url, idx) => `<a href="${url}" target="_blank"><i class="${icons[idx % icons.length]}" style="font-size:24px;color:var(--text-secondary);"></i></a>`).join('')}
                        </div>
                    `);
                default:
                    return wrap(`<div style="${inlineStyle}">مكون ${comp.type}</div>`);
            }
        }

        // ============================================================
        // 8. عرض اللوحة القماشية وتبويبات الصفحات والمكتبة
        // ============================================================
        function renderCanvas() {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            const container = document.getElementById('previewContainer');
            let html = `<div style="padding:8px;"><h2 style="margin-bottom:16px;">📄 ${page.name}</h2>`;
            page.components.forEach(comp => {
                html += renderComponent(comp);
            });
            html += `</div>`;
            container.innerHTML = html;

            // إضافة الأحداث
            document.querySelectorAll('.component-block').forEach(el => {
                const id = el.dataset.id;
                // تحديد العنصر عند النقر
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn')) return;
                    selectedComponentId = id;
                    document.querySelectorAll('.component-block').forEach(b => b.classList.remove('selected'));
                    el.classList.add('selected');
                    renderInspector();
                });
                // زر الحذف
                const delBtn = el.querySelector('.delete-btn');
                if (delBtn) {
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteComponent(id);
                    });
                }
            });
        }

        function renderPagesTabs() {
            const container = document.getElementById('pagesTabs');
            let html = '';
            pages.forEach(p => {
                const active = p.id === currentPageId ? 'active' : '';
                html += `<div class="page-tab ${active}" data-id="${p.id}">
                    <span>${p.name}</span>
                    <i class="fas fa-pen" data-edit="${p.id}"></i>
                    <i class="fas fa-trash" data-del="${p.id}" style="color:var(--danger);"></i>
                </div>`;
            });
            html += `<button class="add-page-btn" id="newPageBtn">+ صفحة جديدة</button>`;
            container.innerHTML = html;

            // أحداث التبويبات
            container.querySelectorAll('.page-tab').forEach(tab => {
                const id = tab.dataset.id;
                tab.addEventListener('click', (e) => {
                    if (e.target.closest('.fa-pen') || e.target.closest('.fa-trash')) return;
                    currentPageId = id;
                    renderAll();
                    saveToLocal();
                });
                const editIcon = tab.querySelector('.fa-pen');
                if (editIcon) {
                    editIcon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const newName = prompt('اسم الصفحة', pages.find(p => p.id === id).name);
                        if (newName) {
                            pages.find(p => p.id === id).name = newName;
                            renderAll();
                            saveToLocal();
                        }
                    });
                }
                const delIcon = tab.querySelector('.fa-trash');
                if (delIcon) {
                    delIcon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (pages.length === 1) {
                            showToast('لا يمكن حذف الصفحة الوحيدة', true);
                            return;
                        }
                        if (confirm('هل تريد حذف هذه الصفحة؟')) {
                            pages = pages.filter(p => p.id !== id);
                            if (currentPageId === id) currentPageId = pages[0].id;
                            renderAll();
                            saveToLocal();
                        }
                    });
                }
            });

            document.getElementById('newPageBtn').addEventListener('click', () => {
                const newId = generateId();
                pages.push({ id: newId, name: 'صفحة جديدة', components: [] });
                currentPageId = newId;
                renderAll();
                saveToLocal();
                showToast('📄 تم إضافة صفحة جديدة');
            });
        }

        function renderComponentsLibrary() {
            const container = document.getElementById('componentsList');
            container.innerHTML = '';
            for (const [cat, items] of Object.entries(componentLibrary)) {
                const catDiv = document.createElement('div');
                catDiv.className = 'components-category';
                catDiv.innerHTML = `
                    <div class="category-title">
                        <span>📁 ${cat}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="components-grid" id="grid-${cat.replace(/\s/g,'')}"></div>
                `;
                container.appendChild(catDiv);
                const grid = catDiv.querySelector('.components-grid');
                items.forEach(item => {
                    const chip = document.createElement('div');
                    chip.className = 'comp-chip';
                    chip.innerHTML = `<i class="fas fa-plus-circle"></i> ${item.name}`;
                    chip.addEventListener('click', () => addComponent(item));
                    grid.appendChild(chip);
                });
                // طي/فرد القسم
                catDiv.querySelector('.category-title').addEventListener('click', () => {
                    const g = catDiv.querySelector('.components-grid');
                    g.style.display = g.style.display === 'none' ? 'flex' : 'none';
                });
            }

            // البحث
            const searchInput = document.getElementById('searchComponents');
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim().toLowerCase();
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    const name = chip.textContent.toLowerCase();
                    chip.style.display = name.includes(q) ? 'inline-flex' : 'none';
                });
            });
        }

        // ============================================================
        // 9. لوحة الخصائص (المفتش)
        // ============================================================
        function renderInspector() {
            const container = document.getElementById('inspectorContent');
            if (!selectedComponentId) {
                container.innerHTML = `<p style="color:var(--text-muted);">🔍 اختر عنصراً لتعديله</p>`;
                return;
            }
            const page = pages.find(p => p.id === currentPageId);
            const comp = page?.components.find(c => c.id === selectedComponentId);
            if (!comp) {
                container.innerHTML = `<p style="color:var(--text-muted);">⚠️ العنصر غير موجود</p>`;
                return;
            }

            const p = comp.props;
            let html = `<h5 style="margin-bottom:12px;">✏️ تحرير: ${comp.type}</h5>`;

            // عرض خصائص عامة حسب النوع
            const commonProps = {
                'heading': ['text', 'level'],
                'paragraph': ['text'],
                'button': ['text', 'link'],
                'image': ['src', 'alt'],
                'video': ['src'],
                'navbar': ['logo', 'items'],
                'footer': ['text'],
                'hero': ['title', 'subtitle', 'btnText', 'btnLink'],
                'card': ['title', 'description', 'image'],
                'gallery': ['images'],
                'testimonial': ['quote', 'author'],
                'pricing': ['title', 'price', 'features'],
                'contact-form': ['fields'],
                'map': ['embed'],
                'social-links': ['links']
            };

            const fields = commonProps[comp.type] || [];
            fields.forEach(field => {
                const value = p[field] || '';
                html += `<div class="inspector-field">
                    <label>${field}</label>
                    <input type="text" data-prop="${field}" value="${value}">
                </div>`;
            });

            // خصائص النمط (style) – نعرض بعضها شائعة
            const styleFields = ['backgroundColor', 'color', 'fontSize', 'padding', 'margin', 'borderRadius', 'boxShadow', 'textAlign'];
            html += `<hr style="margin:12px 0;border-color:var(--border);">`;
            html += `<label style="font-weight:700;font-size:0.8rem;color:var(--text-muted);">الأنماط (CSS)</label>`;
            styleFields.forEach(field => {
                const value = p.style?.[field] || '';
                html += `<div class="inspector-field">
                    <label>${field}</label>
                    <input type="text" data-style="${field}" value="${value}">
                </div>`;
            });

            // أزرار إضافية
            html += `<div class="inspector-actions">
                <button id="applyPropsBtn">تطبيق التغييرات</button>
                <button id="closeInspectorBtn">إغلاق</button>
            </div>`;

            container.innerHTML = html;

            // تطبيق التغييرات
            document.getElementById('applyPropsBtn').addEventListener('click', () => {
                const newProps = {};
                // الخصائص العادية
                const inputs = container.querySelectorAll('input[data-prop]');
                inputs.forEach(inp => {
                    newProps[inp.dataset.prop] = inp.value;
                });
                // الخصائص النمطية
                const styleInputs = container.querySelectorAll('input[data-style]');
                const styleUpdates = {};
                styleInputs.forEach(inp => {
                    styleUpdates[inp.dataset.style] = inp.value;
                });
                if (Object.keys(styleUpdates).length > 0) {
                    newProps.style = styleUpdates;
                }
                updateComponent(selectedComponentId, newProps);
                showToast('✅ تم تحديث العنصر');
            });

            document.getElementById('closeInspectorBtn').addEventListener('click', () => {
                selectedComponentId = null;
                renderInspector();
                document.querySelectorAll('.component-block').forEach(b => b.classList.remove('selected'));
            });
        }

        // ============================================================
        // 10. التصدير إلى HTML كامل
        // ============================================================
        function exportFullSite() {
            // جمع جميع الصفحات مع مكوناتها
            const allPages = pages;
            let exportHtml = `<!DOCTYPE html>
<html lang="ar" dir="rtl">

    </style>
</head>
<body>
    <div class="container">`;

            allPages.forEach(page => {
                exportHtml += `<div class="page-container" data-page-id="${page.id}">
                    <h2 style="margin-bottom:16px;">📄 ${page.name}</h2>`;
                page.components.forEach(comp => {
                    // إعادة استخدام دالة renderComponent لكن بدون الحذف والتحرير
                    const p = comp.props;
                    const style = p.style || {};
                    const inlineStyle = Object.entries(style)
                        .map(([k, v]) => `${k.replace(/([A-Z])/g, '-$1').toLowerCase()}:${v}`)
                        .join(';');

                    const wrap = (html) => `<div class="component-block" style="${inlineStyle}">${html}</div>`;

                    switch (comp.type) {
                        case 'heading':
                            const H = p.level || 'h1';
                            exportHtml += wrap(`<${H}>${p.text}</${H}>`);
                            break;
                        case 'paragraph':
                            exportHtml += wrap(`<p>${p.text}</p>`);
                            break;
                        case 'button':
                            exportHtml += wrap(`<a href="${p.link || '#'}" style="display:inline-block;background:var(--primary);color:#fff;padding:10px 24px;border-radius:var(--radius-full);">${p.text}</a>`);
                            break;
                        case 'image':
                            exportHtml += wrap(`<img src="${p.src}" alt="${p.alt || ''}" style="max-width:100%;border-radius:var(--radius);">`);
                            break;
                        case 'video':
                            exportHtml += wrap(`<video controls style="max-width:100%;"><source src="${p.src}"></video>`);
                            break;
                        case 'navbar':
                            const items = (p.items || '').split(',').map(i => i.trim()).filter(i => i);
                            exportHtml += wrap(`
                                <nav style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;">
                                    <strong>${p.logo}</strong>
                                    <div style="display:flex;gap:16px;">${items.map(i => `<span>${i}</span>`).join('')}</div>
                                </nav>
                            `);
                            break;
                        case 'footer':
                            exportHtml += wrap(`<footer style="text-align:center;padding:20px 0;border-top:1px solid var(--border);">${p.text}</footer>`);
                            break;
                        case 'hero':
                            exportHtml += wrap(`
                                <div style="text-align:center;padding:40px 20px;background:var(--primary-bg);border-radius:var(--radius);">
                                    <h1>${p.title}</h1>
                                    <p style="font-size:1.2rem;margin:12px 0;">${p.subtitle}</p>
                                    <a href="${p.btnLink || '#'}" style="display:inline-block;background:var(--primary);color:#fff;padding:10px 28px;border-radius:var(--radius-full);">${p.btnText}</a>
                                </div>
                            `);
                            break;
                        case 'card':
                            exportHtml += wrap(`
                                <div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius);">
                                    <img src="${p.image}" style="width:100%;border-radius:var(--radius);height:180px;object-fit:cover;">
                                    <h3 style="margin:12px 0 4px;">${p.title}</h3>
                                    <p>${p.description}</p>
                                </div>
                            `);
                            break;
                        case 'gallery':
                            const imgs = (p.images || '').split(',').map(s => s.trim()).filter(s => s);
                            exportHtml += wrap(`
                                <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;">
                                    ${imgs.map(src => `<img src="${src}" style="width:100%;border-radius:var(--radius);height:150px;object-fit:cover;">`).join('')}
                                </div>
                            `);
                            break;
                        case 'testimonial':
                            exportHtml += wrap(`
                                <div style="padding:16px;background:var(--primary-bg);border-radius:var(--radius);font-style:italic;">
                                    <p>"${p.quote}"</p>
                                    <strong>— ${p.author}</strong>
                                </div>
                            `);
                            break;
                        case 'pricing':
                            const features = (p.features || '').split(',').map(f => f.trim()).filter(f => f);
                            exportHtml += wrap(`
                                <div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius);text-align:center;">
                                    <h3>${p.title}</h3>
                                    <div style="font-size:2rem;font-weight:700;">${p.price} ₪</div>
                                    <ul style="list-style:none;padding:0;margin:12px 0;">${features.map(f => `<li>✔ ${f}</li>`).join('')}</ul>
                                    <button style="background:var(--primary);color:#fff;border:none;padding:8px 24px;border-radius:var(--radius-full);">اختر</button>
                                </div>
                            `);
                            break;
                        case 'contact-form':
                            const fields = (p.fields || '').split(',').map(f => f.trim()).filter(f => f);
                            exportHtml += wrap(`
                                <div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius);">
                                    <h4>تواصل معنا</h4>
                                    ${fields.map(f => `<input type="text" placeholder="${f}" style="width:100%;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:var(--radius);">`).join('')}
                                    <button style="background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-full);margin-top:8px;">إرسال</button>
                                </div>
                            `);
                            break;
                        case 'map':
                            exportHtml += wrap(`<iframe src="${p.embed}" style="width:100%;height:300px;border:0;border-radius:var(--radius);" allowfullscreen loading="lazy"></iframe>`);
                            break;
                        case 'social-links':
                            const links = (p.links || '').split(',').map(l => l.trim()).filter(l => l);
                            const icons = ['fab fa-facebook', 'fab fa-twitter', 'fab fa-instagram', 'fab fa-youtube'];
                            exportHtml += wrap(`
                                <div style="display:flex;gap:12px;justify-content:center;">
                                    ${links.map((url, idx) => `<a href="${url}" target="_blank"><i class="${icons[idx % icons.length]}" style="font-size:24px;color:var(--text-secondary);"></i></a>`).join('')}
                                </div>
                            `);
                            break;
                        default:
                            exportHtml += wrap(`<div>مكون ${comp.type}</div>`);
                    }
                });
                exportHtml += `</div>`;
            });

            exportHtml += `
    </div>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"><\/script>
</body>
</html>`;

            const blob = new Blob([exportHtml], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_website.html';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('✅ تم تصدير الموقع بنجاح');
        }

        // ============================================================
        // 11. تهيئة التطبيق
        // ============================================================
        function renderAll() {
            renderPagesTabs();
            renderCanvas();
            renderComponentsLibrary();
            renderInspector();
        }

        // ============================================================
        // 12. المصادقة (محاكاة)
        // ============================================================
        let authMode = 'login';
        const authScreen = document.getElementById('authScreen');
        const dashboard = document.getElementById('dashboard');
        const regName = document.getElementById('regName');
        const authEmail = document.getElementById('authEmail');
        const authPass = document.getElementById('authPassword');
        const authBtn = document.getElementById('authActionBtn');
        const toggleAuth = document.getElementById('toggleAuthMode');
        const demoBtn = document.getElementById('demoBtn');

        function startApp(userName) {
            document.getElementById('userNameHeader').innerHTML = `<i class="fas fa-user-circle"></i> ${userName}`;
            authScreen.style.display = 'none';
            dashboard.style.display = 'flex';
            // تحميل البيانات
            const loaded = loadFromLocal();
            if (!loaded) {
                // إذا لم توجد بيانات، نضع البداية
                renderAll();
                saveToLocal();
            }
            themeManager.init();
        }

        function handleAuth() {
            const email = authEmail.value.trim();
            const pass = authPass.value.trim();
            if (!email || !pass) {
                showToast('املأ البريد وكلمة المرور', true);
                return;
            }
            if (authMode === 'register') {
                const name = regName.value.trim();
                if (!name) {
                    showToast('أدخل اسم المستخدم', true);
                    return;
                }
                // محاكاة التسجيل
                localStorage.setItem('webstudio_user', JSON.stringify({ name, email }));
                startApp(name);
            } else {
                // محاكاة الدخول
                const stored = localStorage.getItem('webstudio_user');
                if (stored) {
                    const user = JSON.parse(stored);
                    if (user.email === email) {
                        startApp(user.name);
                    } else {
                        showToast('البريد غير مسجل', true);
                    }
                } else {
                    // دخول تجريبي تلقائي
                    const demoName = email.split('@')[0] || 'مستخدم';
                    localStorage.setItem('webstudio_user', JSON.stringify({ name: demoName, email }));
                    startApp(demoName);
                }
            }
        }

        authBtn.addEventListener('click', handleAuth);
        toggleAuth.addEventListener('click', () => {
            authMode = authMode === 'login' ? 'register' : 'login';
            regName.style.display = authMode === 'register' ? 'block' : 'none';
            authBtn.textContent = authMode === 'register' ? 'إنشاء حساب' : 'دخول';
            toggleAuth.textContent = authMode === 'register' ? 'لديك حساب؟ سجل دخول' : 'جديد؟ سجل مجاناً';
        });
        demoBtn.addEventListener('click', () => {
            const demoName = 'مستخدم تجريبي ✨';
            localStorage.setItem('webstudio_user', JSON.stringify({ name: demoName, email: 'demo@webstudio.com' }));
            startApp(demoName);
        });

        // التحقق من وجود مستخدم مخزن
        const storedUser = localStorage.getItem('webstudio_user');
        if (storedUser) {
            try {
                const user = JSON.parse(storedUser);
                startApp(user.name);
            } catch (e) {
                // تجاهل
            }
        }

        // ============================================================
        // 13. أحداث إضافية
        // ============================================================
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('redoBtn').addEventListener('click', redo);
        document.getElementById('exportBtn').addEventListener('click', exportFullSite);
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('webstudio_user');
            localStorage.removeItem('webstudio_pages');
            localStorage.removeItem('webstudio_theme');
            location.reload();
        });

        // زر القائمة الجانبية للجوال
        document.getElementById('mobileMenuBtn').addEventListener('click', () => {
            document.getElementById('componentsPanel').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        });
        document.getElementById('overlay').addEventListener('click', () => {
            document.getElementById('componentsPanel').classList.remove('open');
            document.getElementById('inspectorPanel').classList.remove('open');
            document.getElementById('overlay').classList.remove('active');
        });

        // فتح لوحة الخصائص عند اختيار عنصر (سيتم فتحها تلقائياً)
        // جعل لوحة الخصائص قابلة للفتح من زر في الشريط العلوي (اختياري)
        // أضفنا زراً في لوحة الخصائص للإغلاق

        // بداية التشغيل
        console.log('🚀 WebStudio Builder جاهز!');
    })();
</script>
