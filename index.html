<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>WebStudio Builder - محرر المواقع المرئي المتكامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== شاشة المصادقة ===== -->
<div id="authScreen">
    <div class="auth-card">
        <i class="fas fa-cube" style="font-size: 48px; color: var(--primary);"></i>
        <h2>WebStudio Builder</h2>
        <p>أنشئ موقعاً احترافياً ببضع نقرات</p>
        <input type="text" id="regName" placeholder="الاسم (للتسجيل)" style="display:none;">
        <input type="email" id="authEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="authPassword" placeholder="كلمة المرور">
        <button id="authActionBtn">دخول</button>
        <div class="toggle-auth" id="toggleAuthMode">🆕 إنشاء حساب جديد</div>
        <button class="demo-btn" id="demoBtn">🚀 دخول تجريبي فوري</button>
    </div>
</div>

<!-- ===== لوحة التحكم ===== -->
<div id="dashboard">
    <!-- الشريط العلوي المبسط -->
    <div class="toolbar">
        <div class="toolbar-left">
            <span class="logo">⚡ WebStudio</span>
        </div>
        <div class="toolbar-center">
            <button class="toolbar-btn toolbar-btn-primary" id="exportBtn"><i class="fas fa-download"></i> تصدير</button>
        </div>
        <div class="toolbar-right">
            <button class="toolbar-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <div class="user-info" id="userNameHeader"></div>
            <button class="toolbar-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <!-- تبويبات الصفحات -->
    <div class="pages-tabs" id="pagesTabs"></div>

    <!-- التخطيط الرئيسي -->
    <div class="main-layout">
        <!-- لوحة المكونات -->
        <div class="components-panel" id="componentsPanel">
            <div class="components-panel-header">
                <span><i class="fas fa-cubes"></i> المكونات</span>
                <input type="text" id="searchComponents" placeholder="بحث...">
            </div>
            <div id="componentsList" style="padding: 8px 0;"></div>
        </div>

        <!-- منطقة المعاينة -->
        <div class="canvas-area" id="canvasArea">
            <div class="site-preview" id="previewContainer"></div>
        </div>

        <!-- لوحة الخصائص -->
        <div class="inspector" id="inspectorPanel">
            <div class="inspector-header">
                <h4><i class="fas fa-sliders-h"></i> الخصائص</h4>
                <button class="close-inspector-btn" id="closeInspectorMobile"><i class="fas fa-times"></i></button>
            </div>
            <div id="inspectorContent">اختر عنصراً لتعديله</div>
        </div>
    </div>

    <!-- شريط التنقل السفلي للجوال -->
    <div class="mobile-nav-tabs" id="mobileNavTabs">
        <button class="nav-tab active" data-target="canvas-area"><i class="fas fa-eye"></i> المعاينة</button>
        <button class="nav-tab" data-target="components-panel"><i class="fas fa-cubes"></i> المكونات</button>
        <button class="nav-tab" data-target="inspector-panel"><i class="fas fa-sliders-h"></i> الخصائص</button>
    </div>
</div>

<!-- طبقة التغطية للجوال -->
<div class="overlay" id="overlay"></div>

<!-- ============================================================ -->
<!-- جافا سكريبت -->
<!-- ============================================================ -->
<script>
    (function() {
        'use strict';

        // ============================================================
        // 1. الثيم
        // ============================================================
        const themeManager = {
            currentTheme: 'light',
            init() {
                const saved = localStorage.getItem('webstudio_theme');
                if (saved === 'dark') {
                    document.body.classList.add('dark-mode');
                    this.currentTheme = 'dark';
                }
                document.getElementById('themeToggle').addEventListener('click', () => this.toggle());
            },
            toggle() {
                document.body.classList.toggle('dark-mode');
                this.currentTheme = document.body.classList.contains('dark-mode') ? 'dark' : 'light';
                localStorage.setItem('webstudio_theme', this.currentTheme);
                const btn = document.getElementById('themeToggle');
                btn.innerHTML = this.currentTheme === 'dark' ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
            }
        };

        // ============================================================
        // 2. البيانات
        // ============================================================
        let pages = [
            { id: 'home', name: '🏠 الرئيسية', components: [] }
        ];
        let currentPageId = 'home';
        let selectedComponentId = null;
        let historyStack = [];
        let historyPos = -1;

        // ============================================================
        // 3. مكتبة المكونات
        // ============================================================
        const componentLibrary = {
            'أساسيات': [
                { type: 'heading', name: 'عنوان (h1)', defaultProps: { text: 'عنوان رئيسي', level: 'h1', style: { fontSize: '2.5rem', fontWeight: 800 } } },
                { type: 'paragraph', name: 'فقرة نصية', defaultProps: { text: 'هذه فقرة نصية يمكنك تعديلها.', style: { fontSize: '1rem' } } },
                { type: 'button', name: 'زر', defaultProps: { text: 'زر جديد', link: '#', style: { backgroundColor: 'var(--primary)', color: '#fff', borderRadius: 'var(--radius-full)', padding: '10px 24px' } } },
                { type: 'image', name: 'صورة', defaultProps: { src: 'https://picsum.photos/400/250', alt: 'صورة', style: { borderRadius: 'var(--radius)', width: '100%', maxWidth: '400px' } } },
                { type: 'video', name: 'فيديو', defaultProps: { src: 'https://www.w3schools.com/html/mov_bbb.mp4', style: { width: '100%', maxWidth: '600px', borderRadius: 'var(--radius)' } } },
            ],
            'الهيكل': [
                { type: 'navbar', name: 'شريط تنقل', defaultProps: { logo: 'شعارك', items: 'الرئيسية,خدمات,اتصل بنا', style: { backgroundColor: 'var(--surface)', padding: '12px 24px', borderRadius: 'var(--radius-full)', boxShadow: 'var(--shadow)' } } },
                { type: 'footer', name: 'تذييل', defaultProps: { text: '© 2026 جميع الحقوق محفوظة', style: { backgroundColor: 'var(--surface)', padding: '24px', textAlign: 'center', borderTop: '1px solid var(--border)' } } },
                { type: 'hero', name: 'قسم هيرو', defaultProps: { title: 'مرحباً بك في WebStudio', subtitle: 'ابني موقع أحلامك بسهولة', btnText: 'ابدأ الآن', btnLink: '#', style: { padding: '60px 20px', textAlign: 'center', backgroundColor: 'var(--primary-bg)', borderRadius: 'var(--radius-lg)' } } },
            ],
            'المحتوى': [
                { type: 'card', name: 'بطاقة', defaultProps: { title: 'بطاقة مميزة', description: 'وصف مختصر', image: 'https://picsum.photos/300/200', style: { padding: '20px', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', backgroundColor: 'var(--surface)' } } },
                { type: 'gallery', name: 'معرض صور', defaultProps: { images: 'https://picsum.photos/200/150,https://picsum.photos/201/150,https://picsum.photos/202/150', style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(150px,1fr))', gap: '12px' } } },
                { type: 'testimonial', name: 'شهادة عميل', defaultProps: { quote: 'خدمة رائعة أنصح بها الجميع.', author: 'أحمد محمد', style: { padding: '20px', backgroundColor: 'var(--primary-bg)', borderRadius: 'var(--radius)', fontStyle: 'italic' } } },
                { type: 'pricing', name: 'بطاقة سعر', defaultProps: { title: 'باقة أساسية', price: '99', features: 'ميزة 1,ميزة 2,ميزة 3', style: { padding: '24px', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', backgroundColor: 'var(--surface)', textAlign: 'center' } } },
            ],
            'التفاعل': [
                { type: 'contact-form', name: 'نموذج اتصال', defaultProps: { fields: 'الاسم,البريد الإلكتروني,الرسالة', style: { padding: '20px', backgroundColor: 'var(--surface)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)' } } },
                { type: 'map', name: 'خريطة', defaultProps: { embed: 'https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3151.835434509723!2d144.9537353153164!3d-37.81627997975158!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6ad65d5df1f1f1f1%3A0x5045675218ce6e0!2sMelbourne%20VIC%2C%20Australia!5e0!3m2!1sen!2sus!4v1611111111111!5m2!1sen!2sus', style: { width: '100%', height: '300px', borderRadius: 'var(--radius)' } } },
                { type: 'social-links', name: 'روابط التواصل', defaultProps: { links: 'https://facebook.com,https://twitter.com,https://instagram.com', style: { display: 'flex', gap: '12px', justifyContent: 'center' } } },
            ]
        };

        // ============================================================
        // 4. دوال مساعدة
        // ============================================================
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 6);
        }

        function showToast(msg, isError = false) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.innerHTML = msg;
            if (isError) t.style.background = 'var(--danger)';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function saveToLocal() {
            const data = { pages, currentPageId };
            localStorage.setItem('webstudio_pages', JSON.stringify(data));
            pushHistory();
        }

        function loadFromLocal() {
            const saved = localStorage.getItem('webstudio_pages');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    pages = data.pages;
                    currentPageId = data.currentPageId || pages[0]?.id || 'home';
                    if (!pages.find(p => p.id === currentPageId)) {
                        currentPageId = pages[0]?.id || 'home';
                    }
                    renderAll();
                    pushHistory();
                    return true;
                } catch (e) { /* ignore */ }
            }
            // مكونات افتراضية
            const homePage = pages.find(p => p.id === 'home');
            if (homePage && homePage.components.length === 0) {
                homePage.components.push({
                    id: generateId(),
                    type: 'hero',
                    props: {
                        title: 'ابدأ الآن مجاناً',
                        subtitle: 'جميع الأدوات التي تحتاجها لبناء موقعك',
                        btnText: 'استكشف',
                        btnLink: '#',
                        style: { padding: '60px 20px', textAlign: 'center', backgroundColor: 'var(--primary-bg)', borderRadius: 'var(--radius-lg)' }
                    }
                });
                homePage.components.push({
                    id: generateId(),
                    type: 'card',
                    props: {
                        title: 'تصميم حديث',
                        description: 'واجهات جذابة وسهلة الاستخدام',
                        image: 'https://picsum.photos/300/200',
                        style: { padding: '20px', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow)', backgroundColor: 'var(--surface)' }
                    }
                });
            }
            renderAll();
            pushHistory();
            return true;
        }

        // ============================================================
        // 5. التراجع والإعادة (محذوف من الواجهة لكن نترك المنطق للاستخدام الداخلي)
        // ============================================================
        function pushHistory() {
            const state = JSON.parse(JSON.stringify({ pages, currentPageId }));
            historyStack = historyStack.slice(0, historyPos + 1);
            historyStack.push(state);
            historyPos++;
            if (historyStack.length > 50) historyStack.shift();
        }

        // ============================================================
        // 6. إدارة المكونات
        // ============================================================
        function addComponent(compDef) {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            const newComp = {
                id: generateId(),
                type: compDef.type,
                props: JSON.parse(JSON.stringify(compDef.defaultProps))
            };
            page.components.push(newComp);
            renderAll();
            saveToLocal();
            showToast(`➕ تم إضافة ${compDef.name}`);
        }

        function deleteComponent(compId) {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            page.components = page.components.filter(c => c.id !== compId);
            if (selectedComponentId === compId) selectedComponentId = null;
            renderAll();
            saveToLocal();
            showToast('🗑️ حذف العنصر');
        }

        function updateComponent(compId, newProps) {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            const comp = page.components.find(c => c.id === compId);
            if (!comp) return;
            for (const [key, value] of Object.entries(newProps)) {
                if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
                    comp.props[key] = { ...comp.props[key], ...value };
                } else {
                    comp.props[key] = value;
                }
            }
            renderAll();
            saveToLocal();
        }

        // ============================================================
        // 7. عرض المكونات
        // ============================================================
        function renderComponent(comp) {
            const p = comp.props;
            const style = p.style || {};
            const inlineStyle = Object.entries(style)
                .map(([k, v]) => `${k.replace(/([A-Z])/g, '-$1').toLowerCase()}:${v}`)
                .join(';');

            const wrap = (html) => `<div class="component-block" data-id="${comp.id}">
                <div class="delete-btn" data-id="${comp.id}"><i class="fas fa-trash"></i> حذف</div>
                ${html}
            </div>`;

            switch (comp.type) {
                case 'heading':
                    const H = p.level || 'h1';
                    return wrap(`<${H} style="${inlineStyle}">${p.text}</${H}>`);
                case 'paragraph':
                    return wrap(`<p style="${inlineStyle}">${p.text}</p>`);
                case 'button':
                    return wrap(`<a href="${p.link || '#'}" style="${inlineStyle}">${p.text}</a>`);
                case 'image':
                    return wrap(`<img src="${p.src}" alt="${p.alt || ''}" style="${inlineStyle}">`);
                case 'video':
                    return wrap(`<video controls style="${inlineStyle}"><source src="${p.src}"></video>`);
                case 'navbar': {
                    const items = (p.items || '').split(',').map(i => i.trim()).filter(i => i);
                    return wrap(`
                        <nav style="${inlineStyle};display:flex;justify-content:space-between;align-items:center;">
                            <strong>${p.logo}</strong>
                            <div style="display:flex;gap:16px;">${items.map(i => `<span>${i}</span>`).join('')}</div>
                        </nav>
                    `);
                }
                case 'footer':
                    return wrap(`<footer style="${inlineStyle}">${p.text}</footer>`);
                case 'hero':
                    return wrap(`
                        <div style="${inlineStyle}">
                            <h1>${p.title}</h1>
                            <p style="font-size:1.2rem;margin:12px 0;">${p.subtitle}</p>
                            <a href="${p.btnLink || '#'}" style="display:inline-block;background:var(--primary);color:#fff;padding:10px 28px;border-radius:var(--radius-full);">${p.btnText}</a>
                        </div>
                    `);
                case 'card':
                    return wrap(`
                        <div style="${inlineStyle}">
                            <img src="${p.image}" style="width:100%;border-radius:var(--radius);height:180px;object-fit:cover;">
                            <h3 style="margin:12px 0 4px;">${p.title}</h3>
                            <p>${p.description}</p>
                        </div>
                    `);
                case 'gallery': {
                    const imgs = (p.images || '').split(',').map(s => s.trim()).filter(s => s);
                    const gridStyle = p.style || {};
                    const gridInline = Object.entries(gridStyle).map(([k, v]) => `${k.replace(/([A-Z])/g, '-$1').toLowerCase()}:${v}`).join(';');
                    return wrap(`
                        <div style="${gridInline}">
                            ${imgs.map(src => `<img src="${src}" style="width:100%;border-radius:var(--radius);height:150px;object-fit:cover;">`).join('')}
                        </div>
                    `);
                }
                case 'testimonial':
                    return wrap(`
                        <div style="${inlineStyle}">
                            <p>"${p.quote}"</p>
                            <strong>— ${p.author}</strong>
                        </div>
                    `);
                case 'pricing': {
                    const features = (p.features || '').split(',').map(f => f.trim()).filter(f => f);
                    return wrap(`
                        <div style="${inlineStyle}">
                            <h3>${p.title}</h3>
                            <div style="font-size:2rem;font-weight:700;">${p.price} ₪</div>
                            <ul style="list-style:none;padding:0;margin:12px 0;">${features.map(f => `<li>✔ ${f}</li>`).join('')}</ul>
                            <button style="background:var(--primary);color:#fff;border:none;padding:8px 24px;border-radius:var(--radius-full);">اختر</button>
                        </div>
                    `);
                }
                case 'contact-form': {
                    const fields = (p.fields || '').split(',').map(f => f.trim()).filter(f => f);
                    return wrap(`
                        <div style="${inlineStyle}">
                            <h4>تواصل معنا</h4>
                            ${fields.map(f => `<input type="text" placeholder="${f}" style="width:100%;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);">`).join('')}
                            <button style="background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-full);margin-top:8px;">إرسال</button>
                        </div>
                    `);
                }
                case 'map':
                    return wrap(`<iframe src="${p.embed}" style="${inlineStyle}" allowfullscreen loading="lazy"></iframe>`);
                case 'social-links': {
                    const links = (p.links || '').split(',').map(l => l.trim()).filter(l => l);
                    const icons = ['fab fa-facebook', 'fab fa-twitter', 'fab fa-instagram', 'fab fa-youtube'];
                    return wrap(`
                        <div style="${inlineStyle}">
                            ${links.map((url, idx) => `<a href="${url}" target="_blank"><i class="${icons[idx % icons.length]}" style="font-size:24px;color:var(--text-secondary);"></i></a>`).join('')}
                        </div>
                    `);
                }
                default:
                    return wrap(`<div style="${inlineStyle}">مكون ${comp.type}</div>`);
            }
        }

        // ============================================================
        // 8. العرض
        // ============================================================
        function renderCanvas() {
            const page = pages.find(p => p.id === currentPageId);
            if (!page) return;
            const container = document.getElementById('previewContainer');
            let html = `<div style="padding:8px;"><h2 style="margin-bottom:16px;">📄 ${page.name}</h2>`;
            page.components.forEach(comp => {
                html += renderComponent(comp);
            });
            html += `</div>`;
            container.innerHTML = html;

            document.querySelectorAll('.component-block').forEach(el => {
                const id = el.dataset.id;
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.delete-btn')) return;
                    selectedComponentId = id;
                    document.querySelectorAll('.component-block').forEach(b => b.classList.remove('selected'));
                    el.classList.add('selected');
                    renderInspector();
                    if (window.innerWidth <= 900) {
                        openInspector();
                    }
                });
                const delBtn = el.querySelector('.delete-btn');
                if (delBtn) {
                    delBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteComponent(id);
                    });
                }
            });
        }

        function renderPagesTabs() {
            const container = document.getElementById('pagesTabs');
            let html = '';
            pages.forEach(p => {
                const active = p.id === currentPageId ? 'active' : '';
                html += `<div class="page-tab ${active}" data-id="${p.id}">
                    <span>${p.name}</span>
                    <i class="fas fa-pen" data-edit="${p.id}"></i>
                    <i class="fas fa-trash" data-del="${p.id}" style="color:var(--danger);"></i>
                </div>`;
            });
            html += `<button class="add-page-btn" id="newPageBtn">+ صفحة جديدة</button>`;
            container.innerHTML = html;

            container.querySelectorAll('.page-tab').forEach(tab => {
                const id = tab.dataset.id;
                tab.addEventListener('click', (e) => {
                    if (e.target.closest('.fa-pen') || e.target.closest('.fa-trash')) return;
                    currentPageId = id;
                    renderAll();
                    saveToLocal();
                });
                const editIcon = tab.querySelector('.fa-pen');
                if (editIcon) {
                    editIcon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const newName = prompt('اسم الصفحة', pages.find(p => p.id === id).name);
                        if (newName) {
                            pages.find(p => p.id === id).name = newName;
                            renderAll();
                            saveToLocal();
                        }
                    });
                }
                const delIcon = tab.querySelector('.fa-trash');
                if (delIcon) {
                    delIcon.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (pages.length === 1) {
                            showToast('لا يمكن حذف الصفحة الوحيدة', true);
                            return;
                        }
                        if (confirm('هل تريد حذف هذه الصفحة؟')) {
                            pages = pages.filter(p => p.id !== id);
                            if (currentPageId === id) currentPageId = pages[0].id;
                            renderAll();
                            saveToLocal();
                        }
                    });
                }
            });

            document.getElementById('newPageBtn').addEventListener('click', () => {
                const newId = generateId();
                pages.push({ id: newId, name: 'صفحة جديدة', components: [] });
                currentPageId = newId;
                renderAll();
                saveToLocal();
                showToast('📄 تم إضافة صفحة جديدة');
            });
        }

        function renderComponentsLibrary() {
            const container = document.getElementById('componentsList');
            container.innerHTML = '';
            for (const [cat, items] of Object.entries(componentLibrary)) {
                const catDiv = document.createElement('div');
                catDiv.className = 'components-category';
                catDiv.innerHTML = `
                    <div class="category-title">
                        <span>📁 ${cat}</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="components-grid" id="grid-${cat.replace(/\s/g,'')}"></div>
                `;
                container.appendChild(catDiv);
                const grid = catDiv.querySelector('.components-grid');
                items.forEach(item => {
                    const chip = document.createElement('div');
                    chip.className = 'comp-chip';
                    chip.innerHTML = `<i class="fas fa-plus-circle"></i> ${item.name}`;
                    chip.addEventListener('click', () => addComponent(item));
                    grid.appendChild(chip);
                });
                catDiv.querySelector('.category-title').addEventListener('click', () => {
                    const g = catDiv.querySelector('.components-grid');
                    g.style.display = g.style.display === 'none' ? 'flex' : 'none';
                });
            }

            const searchInput = document.getElementById('searchComponents');
            searchInput.addEventListener('input', () => {
                const q = searchInput.value.trim().toLowerCase();
                document.querySelectorAll('.comp-chip').forEach(chip => {
                    const name = chip.textContent.toLowerCase();
                    chip.style.display = name.includes(q) ? 'inline-flex' : 'none';
                });
            });
        }

        // ============================================================
        // 9. لوحة الخصائص – نظام الألوان المتقدم
        // ============================================================
        function renderInspector() {
            const container = document.getElementById('inspectorContent');
            if (!selectedComponentId) {
                container.innerHTML = `<p style="color:var(--text-muted);">🔍 اختر عنصراً لتعديله</p>`;
                return;
            }
            const page = pages.find(p => p.id === currentPageId);
            const comp = page?.components.find(c => c.id === selectedComponentId);
            if (!comp) {
                container.innerHTML = `<p style="color:var(--text-muted);">⚠️ العنصر غير موجود</p>`;
                return;
            }

            const p = comp.props;
            let html = `<h5 style="margin-bottom:12px;">✏️ تحرير: ${comp.type}</h5>`;

            // الخصائص العامة
            const commonProps = {
                'heading': ['text', 'level'],
                'paragraph': ['text'],
                'button': ['text', 'link'],
                'image': ['src', 'alt'],
                'video': ['src'],
                'navbar': ['logo', 'items'],
                'footer': ['text'],
                'hero': ['title', 'subtitle', 'btnText', 'btnLink'],
                'card': ['title', 'description', 'image'],
                'gallery': ['images'],
                'testimonial': ['quote', 'author'],
                'pricing': ['title', 'price', 'features'],
                'contact-form': ['fields'],
                'map': ['embed'],
                'social-links': ['links']
            };

            const fields = commonProps[comp.type] || [];
            fields.forEach(field => {
                const value = p[field] || '';
                html += `<div class="inspector-field">
                    <label>${field}</label>
                    <input type="text" data-prop="${field}" value="${value}">
                </div>`;
            });

            // أداة الألوان المتقدمة (صفين)
            const currentColor = p.style?.color || '#000000';
            html += `
                <hr style="margin:12px 0;border-color:var(--border);">
                <div class="inspector-field">
                    <label>اللون <i class="fas fa-question-circle tooltip-trigger" data-tooltip="اختر لون النص. يمكنك كتابة الكود أو النقر على شريط التدرج."></i></label>
                    <div class="color-picker-advanced">
                        <div class="color-row-top">
                            <input type="text" class="color-hex-input" data-style="color" value="${currentColor}" placeholder="#RRGGBB">
                            <input type="color" class="color-native-picker" value="${currentColor}">
                            <div class="color-preview-box" style="background-color: ${currentColor};"></div>
                        </div>
                        <div class="color-row-bottom">
                            <div class="color-gradient-bar" id="gradientBar"></div>
                        </div>
                    </div>
                </div>
            `;

            // باقي خصائص النمط
            const styleFields = ['backgroundColor', 'fontSize', 'padding', 'margin', 'borderRadius', 'boxShadow', 'textAlign'];
            html += `<hr style="margin:12px 0;border-color:var(--border);">`;
            html += `<label style="font-weight:700;font-size:0.8rem;color:var(--text-muted);">الأنماط (CSS)</label>`;
            styleFields.forEach(field => {
                const value = p.style?.[field] || '';
                html += `<div class="inspector-field">
                    <label>${field}</label>
                    <input type="text" data-style="${field}" value="${value}">
                </div>`;
            });

            html += `<div class="inspector-actions">
                <button id="applyPropsBtn">تطبيق التغييرات</button>
                <button id="closeInspectorBtn">إغلاق</button>
            </div>`;

            container.innerHTML = html;

            // ربط أحداث أداة الألوان
            const hexInput = container.querySelector('.color-hex-input');
            const nativePicker = container.querySelector('.color-native-picker');
            const previewBox = container.querySelector('.color-preview-box');
            const gradientBar = container.querySelector('.color-gradient-bar');

            const updateColorUI = (hex) => {
                hexInput.value = hex;
                nativePicker.value = hex;
                previewBox.style.backgroundColor = hex;
            };

            hexInput.addEventListener('input', function() {
                let val = this.value.trim();
                if (/^#([0-9a-f]{3}){1,2}$/i.test(val)) {
                    updateColorUI(val);
                }
            });

            nativePicker.addEventListener('input', function() {
                updateColorUI(this.value);
            });

            // رسم شريط التدرج
            gradientBar.style.background = 'linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000)';
            gradientBar.style.width = '100%';
            gradientBar.style.height = '32px';
            gradientBar.style.borderRadius = 'var(--radius)';
            gradientBar.style.cursor = 'pointer';
            gradientBar.style.border = '1px solid var(--border)';

            gradientBar.addEventListener('click', function(e) {
                const rect = this.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const percent = Math.min(1, Math.max(0, x / rect.width));
                const hue = Math.round(percent * 360);
                const hex = hslToHex(hue, 100, 50);
                updateColorUI(hex);
                applyColor(hex);
            });

            function hslToHex(h, s, l) {
                s /= 100;
                l /= 100;
                const k = n => (n + h / 30) % 12;
                const a = s * Math.min(l, 1 - l);
                const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, 9 - k(n), 1));
                const r = Math.round(255 * f(0));
                const g = Math.round(255 * f(8));
                const b = Math.round(255 * f(4));
                return `#${[r,g,b].map(c => c.toString(16).padStart(2, '0')).join('')}`;
            }

            function applyColor(hex) {
                const page = pages.find(p => p.id === currentPageId);
                const comp = page?.components.find(c => c.id === selectedComponentId);
                if (comp) {
                    if (!comp.props.style) comp.props.style = {};
                    comp.props.style.color = hex;
                    renderCanvas();
                    renderInspector();
                }
            }

            // تطبيق التغييرات
            document.getElementById('applyPropsBtn').addEventListener('click', () => {
                const newProps = {};
                const inputs = container.querySelectorAll('input[data-prop]');
                inputs.forEach(inp => {
                    newProps[inp.dataset.prop] = inp.value;
                });
                const styleInputs = container.querySelectorAll('input[data-style]');
                const styleUpdates = {};
                styleInputs.forEach(inp => {
                    styleUpdates[inp.dataset.style] = inp.value;
                });
                const colorVal = hexInput.value.trim();
                if (colorVal) {
                    styleUpdates.color = colorVal;
                }
                if (Object.keys(styleUpdates).length > 0) {
                    newProps.style = styleUpdates;
                }
                updateComponent(selectedComponentId, newProps);
                showToast('✅ تم تحديث العنصر');
            });

            document.getElementById('closeInspectorBtn').addEventListener('click', () => {
                selectedComponentId = null;
                renderInspector();
                document.querySelectorAll('.component-block').forEach(b => b.classList.remove('selected'));
                if (window.innerWidth <= 900) {
                    closeInspector();
                }
            });
        }

        // ============================================================
        // 10. تصدير الموقع (مختصر)
        // ============================================================
        function exportFullSite() {
            const allPages = pages;
            let exportHtml = `<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعي - WebStudio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-bg: #eff6ff;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-full: 9999px;
            --font-family: 'Cairo', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:var(--font-family); }
        body { background:var(--bg); color:var(--text-primary); padding:20px; direction:rtl; }
        .container { max-width:1200px; margin:0 auto; background:var(--surface); border-radius:var(--radius); padding:20px; }
        .page-container { display:block; margin-bottom:20px; }
        .component-block { margin:16px 0; padding:12px; border-radius:var(--radius); background:var(--surface); }
        .component-block img { max-width:100%; height:auto; border-radius:var(--radius); }
        .component-block a { text-decoration:none; }
        .component-block button { cursor:pointer; }
    </style>
</head>
<body>
    <div class="container">`;
            allPages.forEach(page => {
                exportHtml += `<div class="page-container" data-page-id="${page.id}">
                    <h2 style="margin-bottom:16px;">📄 ${page.name}</h2>`;
                page.components.forEach(comp => {
                    const p = comp.props;
                    const style = p.style || {};
                    const inlineStyle = Object.entries(style)
                        .map(([k, v]) => `${k.replace(/([A-Z])/g, '-$1').toLowerCase()}:${v}`)
                        .join(';');
                    const wrap = (html) => `<div class="component-block" style="${inlineStyle}">${html}</div>`;
                    switch (comp.type) {
                        case 'heading': const H = p.level || 'h1'; exportHtml += wrap(`<${H}>${p.text}</${H}>`); break;
                        case 'paragraph': exportHtml += wrap(`<p>${p.text}</p>`); break;
                        case 'button': exportHtml += wrap(`<a href="${p.link || '#'}" style="display:inline-block;background:var(--primary);color:#fff;padding:10px 24px;border-radius:var(--radius-full);">${p.text}</a>`); break;
                        case 'image': exportHtml += wrap(`<img src="${p.src}" alt="${p.alt || ''}" style="max-width:100%;border-radius:var(--radius);">`); break;
                        case 'video': exportHtml += wrap(`<video controls style="max-width:100%;"><source src="${p.src}"></video>`); break;
                        case 'navbar': { const items = (p.items || '').split(',').map(i => i.trim()).filter(i => i); exportHtml += wrap(`<nav style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;"><strong>${p.logo}</strong><div style="display:flex;gap:16px;">${items.map(i => `<span>${i}</span>`).join('')}</div></nav>`); break; }
                        case 'footer': exportHtml += wrap(`<footer style="text-align:center;padding:20px 0;border-top:1px solid var(--border);">${p.text}</footer>`); break;
                        case 'hero': exportHtml += wrap(`<div style="text-align:center;padding:40px 20px;background:var(--primary-bg);border-radius:var(--radius);"><h1>${p.title}</h1><p style="font-size:1.2rem;margin:12px 0;">${p.subtitle}</p><a href="${p.btnLink || '#'}" style="display:inline-block;background:var(--primary);color:#fff;padding:10px 28px;border-radius:var(--radius-full);">${p.btnText}</a></div>`); break;
                        case 'card': exportHtml += wrap(`<div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius);"><img src="${p.image}" style="width:100%;border-radius:var(--radius);height:180px;object-fit:cover;"><h3 style="margin:12px 0 4px;">${p.title}</h3><p>${p.description}</p></div>`); break;
                        case 'gallery': { const imgs = (p.images || '').split(',').map(s => s.trim()).filter(s => s); exportHtml += wrap(`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;">${imgs.map(src => `<img src="${src}" style="width:100%;border-radius:var(--radius);height:150px;object-fit:cover;">`).join('')}</div>`); break; }
                        case 'testimonial': exportHtml += wrap(`<div style="padding:16px;background:var(--primary-bg);border-radius:var(--radius);font-style:italic;"><p>"${p.quote}"</p><strong>— ${p.author}</strong></div>`); break;
                        case 'pricing': { const features = (p.features || '').split(',').map(f => f.trim()).filter(f => f); exportHtml += wrap(`<div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius);text-align:center;"><h3>${p.title}</h3><div style="font-size:2rem;font-weight:700;">${p.price} ₪</div><ul style="list-style:none;padding:0;margin:12px 0;">${features.map(f => `<li>✔ ${f}</li>`).join('')}</ul><button style="background:var(--primary);color:#fff;border:none;padding:8px 24px;border-radius:var(--radius-full);">اختر</button></div>`); break; }
                        case 'contact-form': { const fields = (p.fields || '').split(',').map(f => f.trim()).filter(f => f); exportHtml += wrap(`<div style="padding:16px;border:1px solid var(--border);border-radius:var(--radius);"><h4>تواصل معنا</h4>${fields.map(f => `<input type="text" placeholder="${f}" style="width:100%;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:var(--radius);">`).join('')}<button style="background:var(--primary);color:#fff;border:none;padding:10px 24px;border-radius:var(--radius-full);margin-top:8px;">إرسال</button></div>`); break; }
                        case 'map': exportHtml += wrap(`<iframe src="${p.embed}" style="width:100%;height:300px;border:0;border-radius:var(--radius);" allowfullscreen loading="lazy"></iframe>`); break;
                        case 'social-links': { const links = (p.links || '').split(',').map(l => l.trim()).filter(l => l); const icons = ['fab fa-facebook','fab fa-twitter','fab fa-instagram','fab fa-youtube']; exportHtml += wrap(`<div style="display:flex;gap:12px;justify-content:center;">${links.map((url, idx) => `<a href="${url}" target="_blank"><i class="${icons[idx % icons.length]}" style="font-size:24px;color:var(--text-secondary);"></i></a>`).join('')}</div>`); break; }
                        default: exportHtml += wrap(`<div>مكون ${comp.type}</div>`);
                    }
                });
                exportHtml += `</div>`;
            });
            exportHtml += `</div><script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"><\/script></body></html>`;
            const blob = new Blob([exportHtml], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my_website.html';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('✅ تم تصدير الموقع بنجاح');
        }

        // ============================================================
        // 11. تهيئة التطبيق
        // ============================================================
        function renderAll() {
            renderPagesTabs();
            renderCanvas();
            renderComponentsLibrary();
            renderInspector();
        }

        // ============================================================
        // 12. المصادقة
        // ============================================================
        let authMode = 'login';
        const authScreen = document.getElementById('authScreen');
        const dashboard = document.getElementById('dashboard');
        const regName = document.getElementById('regName');
        const authEmail = document.getElementById('authEmail');
        const authPass = document.getElementById('authPassword');
        const authBtn = document.getElementById('authActionBtn');
        const toggleAuth = document.getElementById('toggleAuthMode');
        const demoBtn = document.getElementById('demoBtn');

        function startApp(userName) {
            document.getElementById('userNameHeader').innerHTML = `<i class="fas fa-user-circle"></i> ${userName}`;
            authScreen.style.display = 'none';
            dashboard.style.display = 'flex';
            const loaded = loadFromLocal();
            if (!loaded) {
                renderAll();
                saveToLocal();
            }
            themeManager.init();
        }

        function handleAuth() {
            const email = authEmail.value.trim();
            const pass = authPass.value.trim();
            if (!email || !pass) {
                showToast('املأ البريد وكلمة المرور', true);
                return;
            }
            if (authMode === 'register') {
                const name = regName.value.trim();
                if (!name) {
                    showToast('أدخل اسم المستخدم', true);
                    return;
                }
                localStorage.setItem('webstudio_user', JSON.stringify({ name, email }));
                startApp(name);
            } else {
                const stored = localStorage.getItem('webstudio_user');
                if (stored) {
                    const user = JSON.parse(stored);
                    if (user.email === email) {
                        startApp(user.name);
                    } else {
                        showToast('البريد غير مسجل', true);
                    }
                } else {
                    const demoName = email.split('@')[0] || 'مستخدم';
                    localStorage.setItem('webstudio_user', JSON.stringify({ name: demoName, email }));
                    startApp(demoName);
                }
            }
        }

        authBtn.addEventListener('click', handleAuth);
        toggleAuth.addEventListener('click', () => {
            authMode = authMode === 'login' ? 'register' : 'login';
            regName.style.display = authMode === 'register' ? 'block' : 'none';
            authBtn.textContent = authMode === 'register' ? 'إنشاء حساب' : 'دخول';
            toggleAuth.textContent = authMode === 'register' ? 'لديك حساب؟ سجل دخول' : 'جديد؟ سجل مجاناً';
        });
        demoBtn.addEventListener('click', () => {
            const demoName = 'مستخدم تجريبي ✨';
            localStorage.setItem('webstudio_user', JSON.stringify({ name: demoName, email: 'demo@webstudio.com' }));
            startApp(demoName);
        });

        const storedUser = localStorage.getItem('webstudio_user');
        if (storedUser) {
            try {
                const user = JSON.parse(storedUser);
                startApp(user.name);
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        // 13. الأحداث العامة
        // ============================================================
        document.getElementById('exportBtn').addEventListener('click', exportFullSite);
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('webstudio_user');
            localStorage.removeItem('webstudio_pages');
            localStorage.removeItem('webstudio_theme');
            location.reload();
        });

        // ============================================================
        // 14. التحكم بواجهة الجوال (القوائم واللوحات)
        // ============================================================
        const componentsPanel = document.getElementById('componentsPanel');
        const inspectorPanel = document.getElementById('inspectorPanel');
        const overlay = document.getElementById('overlay');
        const closeInspectorMobile = document.getElementById('closeInspectorMobile');

        function openComponents() {
            componentsPanel.classList.add('open');
            inspectorPanel.classList.remove('open');
            overlay.classList.add('active');
            updateNavTabs('components-panel');
        }

        function openInspector() {
            inspectorPanel.classList.add('open');
            componentsPanel.classList.remove('open');
            overlay.classList.add('active');
            updateNavTabs('inspector-panel');
        }

        function closeAllPanels() {
            componentsPanel.classList.remove('open');
            inspectorPanel.classList.remove('open');
            overlay.classList.remove('active');
            updateNavTabs('canvas-area');
        }

        function updateNavTabs(target) {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.target === target);
            });
        }

        // أزرار شريط التنقل السفلي
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                const target = this.dataset.target;
                if (target === 'components-panel') {
                    openComponents();
                } else if (target === 'inspector-panel') {
                    if (selectedComponentId) {
                        openInspector();
                    } else {
                        showToast('اختر عنصراً أولاً', true);
                    }
                } else {
                    closeAllPanels();
                }
            });
        });

        // زر إغلاق لوحة الخصائص في الجوال
        closeInspectorMobile.addEventListener('click', () => {
            closeAllPanels();
        });

        // طبقة التغطية
        overlay.addEventListener('click', closeAllPanels);

        // عند تغيير حجم الشاشة، نغلق اللوحات إذا أصبحت كبيرة
        window.addEventListener('resize', () => {
            if (window.innerWidth > 900) {
                closeAllPanels();
            }
        });

        // ============================================================
        // 15. نظام التلميحات (Tooltips)
        // ============================================================
        document.addEventListener('mouseover', function(e) {
            const trigger = e.target.closest('.tooltip-trigger');
            if (!trigger) return;
            document.querySelectorAll('.custom-tooltip').forEach(el => el.remove());

            const tooltipText = trigger.dataset.tooltip || 'معلومات';
            const tooltip = document.createElement('div');
            tooltip.className = 'custom-tooltip';
            tooltip.textContent = tooltipText;
            tooltip.style.cssText = `
                position: fixed;
                background: var(--text-primary);
                color: #fff;
                padding: 8px 16px;
                border-radius: var(--radius);
                font-size: 0.85rem;
                max-width: 300px;
                z-index: 99999;
                box-shadow: var(--shadow-lg);
                pointer-events: none;
                direction: rtl;
                font-family: var(--font-family);
                transform: translateY(-50%);
            `;
            document.body.appendChild(tooltip);
            const rect = trigger.getBoundingClientRect();
            tooltip.style.top = (rect.top + window.scrollY) + 'px';
            tooltip.style.left = (rect.right + 16 + window.scrollX) + 'px';
            if (rect.right + 16 + tooltip.offsetWidth > window.innerWidth) {
                tooltip.style.left = (rect.left - tooltip.offsetWidth - 16 + window.scrollX) + 'px';
            }
        });

        document.addEventListener('mouseout', function(e) {
            if (e.target.closest('.tooltip-trigger')) {
                document.querySelectorAll('.custom-tooltip').forEach(el => el.remove());
            }
        });

        console.log('🚀 WebStudio Builder جاهز!');
    })();
</script>
</body>
</html>
